services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-links_helper}
      POSTGRES_USER: ${POSTGRES_USER:-links_helper}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-links_helper_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 10

  migrate:
    image: migrate/migrate:v4.17.1
    restart: "no"
    volumes:
      - ./migrations:/migrations:ro
    command:
      - -path=/migrations
      - -database=${DATABASE_URL:-postgres://links_helper:links_helper_password@postgres:5432/links_helper?sslmode=disable}
      - up
    depends_on:
      postgres:
        condition: service_healthy

  bot:
    build: .
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgres://links_helper:links_helper_password@postgres:5432/links_helper?sslmode=disable}
      TELEGRAM_API_HOST: ${TELEGRAM_API_HOST:-api.telegram.org}
      APP_ENV: ${APP_ENV:-local}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      POLL_BATCH_SIZE: ${POLL_BATCH_SIZE:-100}
      POLL_INTERVAL: ${POLL_INTERVAL:-1s}
      HTTP_TIMEOUT: ${HTTP_TIMEOUT:-35s}
    depends_on:
      migrate:
        condition: service_completed_successfully

volumes:
  postgres_data:
